<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2c3e50">
    <title>세미나 설문조사</title>
    <style>
        :root { --primary: #2c3e50; --point: #3498db; --bg: rgba(0,0,0,0.85); }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #f0f2f5; font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        /* 공통 모달 배경 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.3s ease;
        }

        /* 1. 포스터 모달 전용 */
        #poster-modal { cursor: pointer; }
        .poster-img { 
            max-width: 90%; max-height: 80vh; border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5); transform: translateZ(0); object-fit: contain;
        }

        /* 2. 설문 카드 모달 */
        #survey-modal { display: none; }
        .survey-card {
            width: 90%; max-width: 450px; background: #fff;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; animation: modalUp 0.4s ease-out;
        }
        @keyframes modalUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .card-header { width: 100%; height: 100px; background: #fff; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #eee; }
        .header-img { max-width: 80%; max-height: 70%; object-fit: contain; }

        .progress-bar { width: 0%; height: 4px; background: var(--point); transition: width 0.3s; }

        .card-body { padding: 25px; text-align: center; min-height: 250px; display: flex; flex-direction: column; justify-content: center; }
        .question-text { font-size: 1.25rem; color: var(--primary); margin-bottom: 20px; font-weight: 700; word-break: keep-all; line-height: 1.5; }
        
        /* 버튼 스타일 */
        .option-btn {
            width: 100%; padding: 14px; margin-bottom: 10px; border: 2px solid #eee; 
            border-radius: 12px; background: #fff; font-size: 16px; color: #444;
            cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .option-btn.selected { background: var(--point); color: #fff; border-color: var(--point); font-weight: bold; }

        .card-footer { padding: 20px; background: #f9f9f9; border-top: 1px solid #eee; }
        .next-btn { 
            width: 100%; padding: 16px; background: var(--primary); color: #fff; 
            border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- [Step 1] 포스터 모달 -->
    <div id="poster-modal" class="modal-overlay" onclick="openSurvey()">
        <img src="img/img_2.jpg" class="poster-img" alt="포스터" onerror="this.src='https://via.placeholder.com'">
    </div>

    <!-- [Step 2] 설문 카드 모달 -->
    <div id="survey-modal" class="modal-overlay">
        <div class="survey-card">
            <div class="card-header">
                <img src="img/title.jpg" class="header-img" alt="로고" onerror="this.src='https://via.placeholder.com'">
            </div>
            <div class="progress-bar" id="progress"></div>
            
            <div class="card-body">
                <div id="question-display" class="question-text"></div>
                <div id="input-area"></div>
            </div>

            <div class="card-footer">
                <button class="next-btn" id="action-btn" onclick="handleNext()">다음 문항</button>
            </div>
        </div>
    </div>

    <script>
        const surveyQuestions = [
            { 
                q: "1. '사람'의 뜻이 무엇인지 아시나요?", 
                type: "special", 
                options: ["알고 설명할 수 있다", "잘 모르겠다", "알고 싶다"] 
            },
            { q: "2. 생로병사는 누구에게 있는 것일까요?", type: "choice", options: ["짐승", "사람", "궁금하다"] },
            { q: "3. 사람이 죽는 이유는 무엇이라고 생각하나요?", type: "choice", options: ["나이들어서(老)", "병들어서(病)", "알고싶다"] },
            { q: "4. 생로병사의 해답은 어디에 나와 있을까요?", type: "choice", options: ["성경", "불경", "사서삼경"] },
            { q: "5. 성경에서 생명나무 실과를 먹으면 영원히 사는데 아담은 선악과를 따서 먹고 저주받아 930년을 살았습니다. 그 이유를 아시나요?", type: "text" }
        ];

        let finalAnswers = []; let currentIdx = 0; let selectedOptions = [];

        function openSurvey() {
            document.getElementById('poster-modal').style.display = 'none';
            document.getElementById('survey-modal').style.display = 'flex';
            renderQuestion();
        }

        function renderQuestion() {
            const display = document.getElementById('question-display');
            const area = document.getElementById('input-area');
            const data = surveyQuestions[currentIdx];
            
            display.innerText = data.q;
            area.innerHTML = '';
            selectedOptions = [];

            if (data.type === "text") {
                const input = document.createElement('input');
                input.type = 'text'; input.id = 'temp-input'; input.placeholder = "답변을 입력해 주세요";
                input.style.width="100%"; input.style.padding="15px"; input.style.borderRadius="12px"; input.style.border="2px solid #ddd"; input.style.boxSizing="border-box";
                area.appendChild(input);
            } 
            else if (data.type === "special") {
                // 1번 문항 전용 특수 로직
                data.options.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'option-btn'; b.innerText = opt;
                    b.onclick = () => {
                        if (opt === "알고 싶다") {
                            // "알고 싶다"는 토글(중복 가능)
                            b.classList.toggle('selected');
                        } else {
                            // "알고 설명할 수 있다", "잘 모르겠다"는 단일 선택
                            area.querySelectorAll('.option-btn').forEach(btn => {
                                if (btn.innerText !== "알고 싶다") btn.classList.remove('selected');
                            });
                            b.classList.add('selected');
                        }
                    };
                    area.appendChild(b);
                });
            }
            else {
                // 일반 중복 선택 문항
                data.options.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'option-btn'; b.innerText = opt;
                    b.onclick = () => b.classList.toggle('selected');
                    area.appendChild(b);
                });
            }
            document.getElementById('progress').style.width = ((currentIdx + 1) / surveyQuestions.length * 100) + '%';
            document.getElementById('action-btn').innerText = (currentIdx === surveyQuestions.length - 1) ? "제출 완료" : "다음 문항";
        }

        function handleNext() {
            const data = surveyQuestions[currentIdx];
            let answer;

            if (data.type === "text") {
                answer = document.getElementById('temp-input').value.trim();
            } else {
                const selectedNodes = document.querySelectorAll('.option-btn.selected');
                answer = Array.from(selectedNodes).map(node => node.innerText);
            }

            if (!answer || (Array.isArray(answer) && answer.length === 0)) {
                alert("답변을 입력하거나 선택해 주세요."); return;
            }

            finalAnswers.push({ q: data.q, a: answer });

            if (currentIdx < surveyQuestions.length - 1) {
                currentIdx++;
                renderQuestion();
            } else {
                alert("설문에 참여해 주셔서 감사합니다.");
                console.log("최종 데이터:", finalAnswers);
                location.reload();
            }
        }
    </script>
</body>
</html>
