<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>세미나 설문조사</title>
    <style>
        :root { --primary: #2c3e50; --point: #3498db; --bg: rgba(0,0,0,0.85); }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #f0f2f5; font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }

        /* 설문 카드 모달 */
        #survey-modal { display: none; }
        .survey-card {
            width: 90%; max-width: 450px; background: #fff;
            border-radius: 20px; overflow: hidden; /* 이미지가 삐져나가지 않게 함 */
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
        }

        /* [수정] 타이틀 이미지 공간 - 공백 없이 꽉 채움 */
       /* [수정된 부분] 타이틀 이미지 공간 - 모바일 최적화 */
        .card-header { 
            width: 100%; 
            height: 120px;          /* 모바일 권장 높이 (필요시 조절 가능) */
            margin: 0; 
            padding: 0; 
            overflow: hidden;       /* 이미지가 넘쳐도 밖으로 나가지 않게 함 */
            display: block;         /* flex 제거로 불필요한 중앙 정렬 여백 방지 */
            line-height: 0;         /* 텍스트 줄바꿈 공백 제거 */
            font-size: 0;           /* 인라인 요소 공백 제거 */
        }
        
        .header-img { 
            width: 100% !important; /* 가로 꽉 채움 */
            height: 100% !important; /* 세로 꽉 채움 */
            object-fit: cover;      /* [핵심] 이미지 비율에 상관없이 공간을 꽉 채움 */
            display: block;         /* 이미지 하단 기본 여백 제거 */
            border: none;
            margin: 0;
            padding: 0;
        }
        
        /* 설문 카드 모서리 둥글게 유지 */
        .survey-card {
            width: 90%; 
            max-width: 450px; 
            background: #fff;
            border-radius: 20px; 
            overflow: hidden;       /* 상단 이미지가 둥근 모서리에 맞춰 잘리도록 함 */
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        /* 화면이 아주 작은 폰을 위한 추가 조절 */
        @media (max-width: 380px) {
            .card-header, .header-img {
                max-height: 90px;   /* 더 작은 화면에서는 높이를 더 줄임 */
            }
        }

        .progress-bar { width: 0%; height: 4px; background: var(--point); transition: width 0.3s; }

        .card-body { padding: 25px; text-align: center; min-height: 250px; display: flex; flex-direction: column; justify-content: center; }
        .question-text { font-size: 1.2rem; color: var(--primary); margin-bottom: 20px; font-weight: 700; word-break: keep-all; line-height: 1.5; }
        
        .option-btn {
            width: 100%; padding: 14px; margin-bottom: 10px; border: 2px solid #eee; 
            border-radius: 12px; background: #fff; font-size: 16px; color: #444;
            cursor: pointer; transition: all 0.2s;
        }
        .option-btn.selected { background: var(--point); color: #fff; border-color: var(--point); font-weight: bold; }

        .card-footer { padding: 20px; background: #f9f9f9; border-top: 1px solid #eee; }
        .next-btn { 
            width: 100%; padding: 16px; background: var(--primary); color: #fff; 
            border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- [Step 1] 포스터 모달 (동일) -->
    <div id="poster-modal" class="modal-overlay" onclick="openSurvey()">
        <img src="img/img_2.jpg" class="poster-img" style="max-width:90%; border-radius:12px;" onerror="this.src='https://via.placeholder.com'">
    </div>

    <!-- [Step 2] 설문 카드 모달 -->
    <div id="survey-modal" class="modal-overlay">
        <div class="survey-card">
            <!-- 타이틀 이미지 영역: 공백 없음 -->
            <div class="card-header">
                <img src="img/title.jpg" class="header-img" alt="타이틀 이미지" onerror="this.src='https://via.placeholder.com'">
            </div>
            
            <div class="progress-bar" id="progress"></div>
            
            <div class="card-body">
                <div id="question-display" class="question-text"></div>
                <div id="input-area"></div>
            </div>

            <div class="card-footer">
                <button class="next-btn" id="action-btn" onclick="handleNext()">다음 문항</button>
            </div>
        </div>
    </div>

    <script>
        // 1번 문항 특수 로직 포함된 기존 스크립트 동일 적용
        const surveyQuestions = [
            { q: "1. '사람'의 뜻이 무엇인지 아시나요?", type: "special", options: ["알고 설명할 수 있다", "잘 모르겠다", "알고 싶다"] },
            { q: "2. 생로병사는 누구에게 있는 것일까요?", type: "choice", options: ["짐승", "사람", "궁금하다"] },
            { q: "3. 사람이 죽는 이유는 무엇이라고 생각하나요?", type: "choice", options: ["나이들어서(老)", "병들어서(病)", "알고싶다"] },
            { q: "4. 생로병사의 해답은 어디에 나와 있을까요?", type: "choice", options: ["성경", "불경", "사서삼경"] },
            { q: "5. 성경에서 생명나무 실과를 먹으면 영원히 사는데 아담은 선악과를 따서 먹고 저주받아 930년을 살았습니다. 그 이유를 아시나요?", type: "text" }
        ];

        let currentIdx = 0;

        function openSurvey() {
            document.getElementById('poster-modal').style.display = 'none';
            document.getElementById('survey-modal').style.display = 'flex';
            renderQuestion();
        }

        function renderQuestion() {
            const display = document.getElementById('question-display');
            const area = document.getElementById('input-area');
            const data = surveyQuestions[currentIdx];
            display.innerText = data.q;
            area.innerHTML = '';

            if (data.type === "text") {
                const input = document.createElement('input');
                input.type = 'text'; input.id = 'temp-input'; input.placeholder = "답변을 입력해 주세요";
                input.style.width="100%"; input.style.padding="15px"; input.style.borderRadius="12px"; input.style.border="2px solid #ddd"; input.style.boxSizing="border-box";
                area.appendChild(input);
            } else if (data.type === "special") {
                data.options.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'option-btn'; b.innerText = opt;
                    b.onclick = () => {
                        if (opt === "알고 싶다") b.classList.toggle('selected');
                        else {
                            area.querySelectorAll('.option-btn').forEach(btn => { if (btn.innerText !== "알고 싶다") btn.classList.remove('selected'); });
                            b.classList.add('selected');
                        }
                    };
                    area.appendChild(b);
                });
            } else {
                data.options.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'option-btn'; b.innerText = opt;
                    b.onclick = () => b.classList.toggle('selected');
                    area.appendChild(b);
                });
            }
            document.getElementById('progress').style.width = ((currentIdx + 1) / surveyQuestions.length * 100) + '%';
            document.getElementById('action-btn').innerText = (currentIdx === surveyQuestions.length - 1) ? "제출 완료" : "다음 문항";
        }

        function handleNext() {
            const data = surveyQuestions[currentIdx];
            let answer = data.type === "text" ? document.getElementById('temp-input').value.trim() : 
                        Array.from(document.querySelectorAll('.option-btn.selected')).map(n => n.innerText);

            if (!answer || (Array.isArray(answer) && answer.length === 0)) { alert("답변을 입력하거나 선택해 주세요."); return; }

            if (currentIdx < surveyQuestions.length - 1) { currentIdx++; renderQuestion(); } 
            else { alert("설문이 완료되었습니다."); location.reload(); }
        }
    </script>
</body>
</html>
